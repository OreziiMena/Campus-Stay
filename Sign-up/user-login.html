<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signup.css">
    <link rel="icon" href="..//CAMPUS STAY LOGO.png">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Log In | Campus Stay</title>
</head>
<body class="auth-page">

    <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>

    <section class="auth-container">
        <div class="auth-card" style="max-width: 450px; margin: 0 auto;">
            
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Log in to your Campus Stay account.</p>
            </div>

            <form id="login-form" class="auth-form">
                
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <div class="password-label-row">
                        <label for="password">Password</label>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <i class="fas fa-eye toggle-password" id="toggle-password-icon"></i>
                    </div>

                    <div class="rf-flex">
                        <div class="checkbox-group" style="margin-bottom: 20px;">
                            <input type="checkbox" id="remember-me">
                            <label for="remember-me">Remember me</label>
                        </div>
                        <div class="forgot-password-container">
                            <a href="fpassword.html" class="forgot-password-link">Forgot Password?</a>
                            <small class="error-text" id="login-error">Invalid email or password.</small>
                        </div>
                    </div>
                </div>

                <button type="submit" class="auth-submit-btn" style="margin-top: 10px;">Log In</button>
                
                <p class="auth-footer-text">Don't have an account? <a href="rolepick.html">Sign up</a></p>
            </form>
        </div>
    </section>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
    const loginForm = document.getElementById("login-form");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginErrorText = document.getElementById("login-error");
    const togglePasswordIcon = document.getElementById("toggle-password-icon");
    const rememberMeCheckbox = document.getElementById("remember-me");

    //Toggle password icon 
    if (togglePasswordIcon && passwordInput) {
        togglePasswordIcon.addEventListener("click", () => {
            
            // Check current type and swap it
            const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
            passwordInput.setAttribute("type", type);
            
            // Swap the FontAwesome icon classes
            togglePasswordIcon.classList.toggle("fa-eye");
            togglePasswordIcon.classList.toggle("fa-eye-slash");
        });
    }

    loginForm.addEventListener("submit", (e) => {
        e.preventDefault(); 

        const enteredEmail = emailInput.value.toLowerCase();
        const enteredPassword = passwordInput.value;

        //success logic
            loginErrorText.style.display = "none";

                window.location.href = "student-dashboard.html";
            } else if (data.role === "agent") {
                window.location.href = "agent-dashboard.html";
            }
        })
        .catch(error => {
            // Wrong email or password
            loginErrorText.style.display = "block";
            loginErrorText.innerText = "Invalid email or password.";
            emailInput.classList.add("invalid-input");
            passwordInput.classList.add("invalid-input");
            
            // Clear the password field so they can try again easily
            passwordInput.value = ""; 
        });
       
    });
//});Please uncomment this line when connecting to the backend
    </script>
</body>
</html>
