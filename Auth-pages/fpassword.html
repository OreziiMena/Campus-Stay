<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="signup.css"> 
    <link rel="icon" href="../Assets/CAMPUS STAY LOGO.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <title>Forgot Password | Campus Stay</title>
</head>

<body class="auth-page">
     <a href="user-login.html" class="back-link"><i class="fas fa-arrow-left"></i> Go back</a>

    <div class="auth-container">
        <div class="auth-card" style="max-width: 450px; margin: 0 auto;">
        <div class="auth-header">
            <h2>Reset Your Password</h2>
            <p>Enter your email address and we will send you a secure link to reset your password.</p>
        </div>

        <form id="forgot-password-form">
            <div class="input-group">
                <label for="reset-email">Email Address</label>
                <input type="email" id="reset-email" placeholder="student@fupre.edu.ng" required>
                
                <small class="error-text" id="reset-error" style="display: none;">We couldn't find an account with that email.</small>
                <small class="success-text" id="reset-success" style="display: none; color: #28a745; margin-top: 5px; font-weight: 600;">
                    Reset link sent! Please check your inbox.
                </small>
            </div>

            <button type="submit" class="auth-submit-btn" id="submit-btn" style="width: 100%; margin-top: 10px;">Send Reset Link</button>
        </form>

        <div class="auth-footer-text">
            <p>Remembered your password? <a href="user-login.html" class="auth-link">Back to Login</a></p>
        </div>
        </div>
    </div>

    <script>
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("forgot-password-form");
    const emailInput = document.getElementById("reset-email");
    const errorText = document.getElementById("reset-error");
    const successText = document.getElementById("reset-success");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", (e) => {
        e.preventDefault();

        const enteredEmail = emailInput.value.toLowerCase();

        // Disable the button so they can't click it twice while "sending"
        submitBtn.disabled = true;
        submitBtn.innerText = "Sending Link...";
        errorText.style.display = "none";
        successText.style.display = "none";

        // Simulate network delay (1.5 seconds)
        setTimeout(() => {
            // Show success message
            successText.style.display = "block";
            emailInput.classList.remove("invalid-input");
            
            // Reset button state
            submitBtn.disabled = false;
            submitBtn.innerText = "Send Reset Link";
            
            // Clear the input field
            emailInput.value = ""; 
        }, 1500);

        //BACKEND INTEGRATION SHOULD GO HERE. PLEASE UNCOMMENT AND UPDATE WHEN CONNECTING TO THE DATABASE
        
    });
});
    </script>
</body>
</html>
